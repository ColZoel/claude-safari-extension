name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Version Bump Required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check all 4 version sources match
        run: |
          MANIFEST=$(python3 -c "import json; print(json.load(open('ClaudeInSafari Extension/Resources/manifest.json'))['version'])")
          APP_PLIST=$(/usr/bin/python3 -c "
          import plistlib
          with open('ClaudeInSafari/Info.plist', 'rb') as f:
              print(plistlib.load(f)['CFBundleShortVersionString'])
          ")
          EXT_PLIST=$(/usr/bin/python3 -c "
          import plistlib
          with open('ClaudeInSafari Extension/Info.plist', 'rb') as f:
              print(plistlib.load(f)['CFBundleShortVersionString'])
          ")
          PROJECT_YML=$(python3 -c "
          import re
          matches = re.findall(r'CFBundleShortVersionString: \"(.+?)\"', open('project.yml').read())
          versions = set(matches)
          if len(versions) != 1:
              print('MISMATCH')
          else:
              print(versions.pop())
          ")

          echo "manifest.json:              ${MANIFEST}"
          echo "ClaudeInSafari/Info.plist:   ${APP_PLIST}"
          echo "Extension/Info.plist:        ${EXT_PLIST}"
          echo "project.yml:                ${PROJECT_YML}"

          FAIL=0
          if [ "$MANIFEST" != "$APP_PLIST" ]; then
            echo "::error::Version mismatch: manifest.json (${MANIFEST}) != ClaudeInSafari/Info.plist (${APP_PLIST})"
            FAIL=1
          fi
          if [ "$MANIFEST" != "$EXT_PLIST" ]; then
            echo "::error::Version mismatch: manifest.json (${MANIFEST}) != Extension/Info.plist (${EXT_PLIST})"
            FAIL=1
          fi
          if [ "$MANIFEST" != "$PROJECT_YML" ]; then
            echo "::error::Version mismatch: manifest.json (${MANIFEST}) != project.yml (${PROJECT_YML})"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::All 4 version sources must match. Update them all to the same version."
            exit 1
          fi
          echo "All 4 version sources match: ${MANIFEST}"

      - name: Check version is new
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('ClaudeInSafari Extension/Resources/manifest.json'))['version'])")
          TAG="v${VERSION}"
          echo "Version: ${VERSION} → Tag: ${TAG}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Bump the version before merging."
            exit 1
          else
            echo "Tag ${TAG} does not exist — version bump is valid."
          fi

  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm test

      - name: Validate injected scripts syntax
        run: node scripts/validate-injected-scripts.js

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafari \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty

      - name: Run Swift tests
        timeout-minutes: 10
        run: |
          # test-without-building avoids re-compilation and reduces the
          # chance of the test host app hanging after tests complete.
          # Background + poll as a safety net in case it still hangs.
          xcodebuild test-without-building \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafari \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          > /tmp/xc-test.log 2>&1 &
          XC_PID=$!

          while kill -0 $XC_PID 2>/dev/null; do
            if grep -q "Executed.*tests" /tmp/xc-test.log 2>/dev/null; then
              cat /tmp/xc-test.log
              kill $XC_PID 2>/dev/null || true
              wait $XC_PID 2>/dev/null || true
              if grep -q "0 failures" /tmp/xc-test.log; then
                echo "All tests passed."
                exit 0
              else
                echo "Tests had failures."
                exit 1
              fi
            fi
            sleep 2
          done

          # xcodebuild exited on its own
          cat /tmp/xc-test.log
          wait $XC_PID 2>/dev/null
