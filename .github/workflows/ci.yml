name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm test

      - name: Validate injected scripts syntax
        run: node scripts/validate-injected-scripts.js

      - name: Build (Xcode)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafari \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty

      - name: Run Swift tests
        timeout-minutes: 15
        run: |
          # xcodebuild test hangs after completion because the macOS app
          # test host (ClaudeInSafari.app) keeps its services running.
          # Run in background and poll for the test summary line.
          xcodebuild test \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafari \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          > /tmp/xc-test.log 2>&1 &
          XC_PID=$!

          while kill -0 $XC_PID 2>/dev/null; do
            if grep -q "Executed.*tests" /tmp/xc-test.log 2>/dev/null; then
              cat /tmp/xc-test.log
              kill $XC_PID 2>/dev/null || true
              wait $XC_PID 2>/dev/null || true
              if grep -q "0 failures" /tmp/xc-test.log; then
                echo "All tests passed."
                exit 0
              else
                echo "Tests had failures."
                exit 1
              fi
            fi
            sleep 2
          done

          # xcodebuild exited on its own
          cat /tmp/xc-test.log
          wait $XC_PID 2>/dev/null
