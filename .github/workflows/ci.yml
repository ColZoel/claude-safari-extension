name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm test

      - name: Validate injected scripts syntax
        run: node scripts/validate-injected-scripts.js

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafari \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty

      - name: Run Swift tests
        timeout-minutes: 10
        run: |
          # test-without-building avoids re-compilation and reduces the
          # chance of the test host app hanging after tests complete.
          # Background + poll as a safety net in case it still hangs.
          xcodebuild test-without-building \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafari \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          > /tmp/xc-test.log 2>&1 &
          XC_PID=$!

          while kill -0 $XC_PID 2>/dev/null; do
            if grep -q "Executed.*tests" /tmp/xc-test.log 2>/dev/null; then
              cat /tmp/xc-test.log
              kill $XC_PID 2>/dev/null || true
              wait $XC_PID 2>/dev/null || true
              if grep -q "0 failures" /tmp/xc-test.log; then
                echo "All tests passed."
                exit 0
              else
                echo "Tests had failures."
                exit 1
              fi
            fi
            sleep 2
          done

          # xcodebuild exited on its own
          cat /tmp/xc-test.log
          wait $XC_PID 2>/dev/null
