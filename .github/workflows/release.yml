name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: macos-15
    environment: Production

    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafari \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty

      # Tests are already validated by CI on every push to main.
      # Skipped here because xcodebuild test hangs after completion —
      # the macOS app test host keeps running (MCP server, menu bar).

      # ── Signing ────────────────────────────────────────────────────────────
      - name: Import Developer ID certificate
        if: env.APPLE_CERTIFICATE != ''
        run: |
          # Decode certificate and import into a temporary keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "" build.keychain
          rm /tmp/certificate.p12

      - name: Sign .app bundle
        if: env.APPLE_CERTIFICATE != ''
        run: |
          APP_PATH=$(find build/DerivedData -name "Claude in Safari.app" -maxdepth 6 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find ClaudeInSafari.app in build output"
            exit 1
          fi
          # Sign from inside out: extension first, then app (Apple requires this for bundles with extensions)
          codesign --force --options runtime \
            --sign "Developer ID Application" \
            --entitlements "ClaudeInSafari Extension/ClaudeInSafariExtension.entitlements" \
            "$APP_PATH/Contents/PlugIns/ClaudeInSafari Extension.appex"
          codesign --force --options runtime \
            --sign "Developer ID Application" \
            --entitlements "ClaudeInSafari/ClaudeInSafari.entitlements" \
            "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Locate unsigned .app (when signing skipped)
        if: env.APPLE_CERTIFICATE == ''
        run: |
          APP_PATH=$(find build/DerivedData -name "Claude in Safari.app" -maxdepth 6 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find ClaudeInSafari.app in build output"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      # ── Notarization ───────────────────────────────────────────────────────
      - name: Notarize .app
        if: env.APPLE_ID != '' && env.APP_PASSWORD != '' && env.TEAM_ID != ''
        run: |
          # Package for submission
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" /tmp/app-for-notarization.zip

          # Submit and capture the submission ID
          SUBMIT_OUT=$(xcrun notarytool submit /tmp/app-for-notarization.zip \
            --apple-id "$APPLE_ID" \
            --password "$APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait \
            --timeout 600 2>&1) || true
          echo "$SUBMIT_OUT"

          SUB_ID=$(echo "$SUBMIT_OUT" | grep "id:" | head -1 | awk '{print $2}')

          # Check if notarization succeeded
          if echo "$SUBMIT_OUT" | grep -q "status: Accepted"; then
            xcrun stapler staple "$APP_PATH"
          else
            echo "::error::Notarization failed. Fetching rejection log..."
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASSWORD" \
              --team-id "$TEAM_ID" || true
            exit 1
          fi

          rm /tmp/app-for-notarization.zip

      # ── DMG creation ───────────────────────────────────────────────────────
      - name: Create DMG
        run: |
          chmod +x scripts/create-dmg.sh
          scripts/create-dmg.sh "$APP_PATH"
          # create-dmg.sh is expected to produce ClaudeInSafari.dmg
          DMG_PATH=$(find . -maxdepth 2 -name "*.dmg" | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "::error::create-dmg.sh did not produce a .dmg file"
            exit 1
          fi
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Notarize DMG
        if: env.APPLE_ID != '' && env.APP_PASSWORD != '' && env.TEAM_ID != '' && env.DMG_PATH != ''
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait \
            --timeout 600

          xcrun stapler staple "$DMG_PATH"

      # ── App Store upload ───────────────────────────────────────────────────
      - name: Archive for App Store
        if: env.APP_STORE_CONNECT_KEY != ''
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafari \
            -destination "platform=macOS" \
            -archivePath build/ClaudeInSafari.xcarchive \
          | xcpretty

      - name: Write App Store Connect API key
        if: env.APP_STORE_CONNECT_KEY != ''
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_KEY" | base64 --decode \
            > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Export & upload to App Store Connect
        if: env.APP_STORE_CONNECT_KEY != ''
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/ClaudeInSafari.xcarchive \
            -exportPath build/AppStoreExport \
            -exportOptionsPlist ExportOptions.plist \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
          | xcpretty

      # ── Package zip artifact ───────────────────────────────────────────────
      - name: Archive .app to zip
        env:
          TAG: ${{ github.ref_name }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "ClaudeInSafari-${TAG}.zip"

      # ── Rename DMG with tag ────────────────────────────────────────────────
      - name: Rename DMG with version tag
        if: env.DMG_PATH != ''
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAGGED_DMG="ClaudeInSafari-${TAG}.dmg"
          mv "$DMG_PATH" "$TAGGED_DMG"
          echo "TAGGED_DMG=$TAGGED_DMG" >> "$GITHUB_ENV"

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release (signed + notarized)
        if: env.APPLE_CERTIFICATE != '' && env.APPLE_ID != '' && env.TAGGED_DMG != ''
        uses: softprops/action-gh-release@v2
        with:
          name: "Claude in Safari ${{ github.ref_name }}"
          body: |
            ## Claude in Safari ${{ github.ref_name }}

            Signed and notarized — drag **Claude in Safari.app** from the DMG to Applications and launch normally.

            See [ROADMAP.md](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md) for what's included in this version.
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          files: |
            ClaudeInSafari-${{ github.ref_name }}.zip
            ${{ env.TAGGED_DMG }}

      - name: Create GitHub Release (signed, no notarization)
        if: env.APPLE_CERTIFICATE != '' && env.APPLE_ID == '' && env.TAGGED_DMG != ''
        uses: softprops/action-gh-release@v2
        with:
          name: "Claude in Safari ${{ github.ref_name }}"
          body: |
            ## Claude in Safari ${{ github.ref_name }}

            Signed but not notarized. On first launch macOS may show a Gatekeeper dialog — click **Open Anyway** in System Settings > Privacy & Security.

            See [ROADMAP.md](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md) for what's included in this version.
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          files: |
            ClaudeInSafari-${{ github.ref_name }}.zip
            ${{ env.TAGGED_DMG }}

      - name: Create GitHub Release (unsigned, no DMG)
        if: env.APPLE_CERTIFICATE == ''
        uses: softprops/action-gh-release@v2
        with:
          name: "Claude in Safari ${{ github.ref_name }}"
          body: |
            ## Claude in Safari ${{ github.ref_name }}

            > **Pre-release build** — unsigned, for developers only. Requires Gatekeeper bypass to run (`xattr -cr "Claude in Safari.app"`).

            See [ROADMAP.md](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md) for what's included in this version.
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          files: "ClaudeInSafari-${{ github.ref_name }}.zip"
